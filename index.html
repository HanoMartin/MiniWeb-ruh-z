<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.1.0/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">

<title>Mini webáruház</title>
</head>

<body>
        <div id="felsoMenu">
            <div class="menu-title">Mini Webshop</div>

            <div id="menuIcons">
                <a href="index.html" class="menu-item">🏠</a>
                <a href="cart.html" class="menu-item">🛒</a>
                <button id="settingsBtn" class="menu-item">⚙️</button>
            </div>

            <button id="hamburger" class="hamburger">☰</button>
        </div>

        <!-- Mobil lenyíló menü -->
        <div id="mobilMenu" class="mobil-menu">
            <a href="index.html">🏠 Főoldal</a>
            <a href="cart.html">🛒 Kosár</a>
            <button id="settingsBtn2">⚙️ Beállítások</button>
        </div>

        <main class="container mt-5 pt-4">

            <h1 class="text-center my-4">Mini webáruház</h1>

            <h3>Termék hozzáadása</h3>

            <div class="input-group mb-4">
                <input id="name" class="form-control" placeholder="Név">
                <input id="desc" class="form-control" placeholder="Leírás">
                <input id="price" type="number" class="form-control" placeholder="Ár">
                <input id="stock" type="number" class="form-control" placeholder="DB">
                <button id="hozzagomb" class="btn btn-primary">Hozzáadás</button>
            </div>

            <div class="row g-4" id="termekek"></div>

        </main>

        <!-- MÓDOSÍTÓ MENÜ -->
        <div id="modositMenu" class="modosit-popup">
            <div class="modosit-content">
                <h4>Termék módosítása</h4>

                <input id="modNev" class="form-control mb-2" placeholder="Név">
                <input id="modAr" type="number" class="form-control mb-2" placeholder="Ár">
                <input id="modKeszlet" type="number" class="form-control mb-2" placeholder="Készlet">

                <button id="mentesMod" class="btn btn-success w-100 mt-2">Mentés</button>
                <button id="bezMod" class="btn btn-secondary w-100 mt-2">Bezárás</button>
            </div>
        </div>

        <!-- BEÁLLÍTÁSOK PANEL -->
        <div id="settingsPanel" class="settings-popup">
            <div class="settings-content">
                <h4>Beállítások</h4>

                <button id="temaValtas" class="btn btn-dark w-100 mb-2">🌙 Sötét mód</button>
                <button id="bezarSettings" class="btn btn-secondary w-100">Bezárás</button>
            </div>
        </div>

<script type="module" src="js/post.js"></script>
<script type="module" src="js/get.js"></script>

</body>
</html>
